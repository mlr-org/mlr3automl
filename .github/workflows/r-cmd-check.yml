# r cmd check workflow of the mlr3 ecosystem v0.6.0
# You can remove the `services.redis` section if the package does not require `rush` for the tests
# https://github.com/mlr-org/actions
# Modifications:
# - Add mlr-org and eagerai R-universe repositories to the setup-r step
# - Add catboost package from github repository to the setup-r-dependencies step
# - Add a step to install torch
# - Remove the --as-cran argument from the check-r-package step
on:
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Run the build with tmate debugging enabled'
        required: false
        default: false
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

name: r-cmd-check

jobs:
  r-cmd-check:
    runs-on: ${{ matrix.config.os }}
    services:
      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      RUSH_TEST_USE_REDIS: true

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,   r: 'devel'}
          - {os: ubuntu-latest,   r: 'release'}

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          extra-repositories: |
            https://mlr-org.r-universe.dev
            https://eagerai.r-universe.dev

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
            catboost/catboost/catboost/R-package
          needs: check

      - name: Install torch
        run: |
          Rscript -e 'torch::install_torch()'

      - uses: mxschmitt/action-tmate@v3
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}
        with:
          limit-access-to-actor: true

      - uses: r-lib/actions/check-r-package@v2
        with:
          error-on: '"note"'
          args: 'c("--no-manual")' # "--as-cran" prevents to start external processes
