# r cmd check workflow of the mlr3 ecosystem v0.6.0
# You can remove the `services.redis` section if the package does not require `rush` for the tests
# https://github.com/mlr-org/actions
# Modifications:
# - Add mlr-org R-universe repository to the setup-r step
# - Add catboost package from github repository to the setup-r-dependencies step
# - Add a step to install torch
# - Remove the --as-cran argument from the check-r-package step
on:
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Run the build with tmate debugging enabled'
        required: false
        default: false
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

name: r-cmd-check

jobs:
  r-cmd-check:
    runs-on: ${{ matrix.config.os }}
    services:
      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      RUSH_TEST_USE_REDIS: true
      # token for tabpfn model weight download (add as a repository secret)
      TABPFN_TOKEN: ${{ secrets.TABPFN_TOKEN }}

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,   r: 'devel'}
          - {os: ubuntu-latest,   r: 'release'}

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          extra-repositories: |
            https://mlr-org.r-universe.dev

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
            any::pkgload
            catboost/catboost/catboost/R-package
          needs: check
          cache: "always"

      - name: Install torch
        run: |
          Rscript -e 'torch::install_torch()'

      # Provide the Python environment for the tabpfn and fastai learners.
      # micromamba is the conda binary reticulate needs to bind to a conda env.
      # The environment is cached and only rebuilt when the package list changes,
      # so torch and friends are not downloaded on every run.
      - name: Set up micromamba
        run: |
          curl -Ls https://micro.mamba.pm/api/micromamba/linux-64/latest | tar -xj -C "$HOME" bin/micromamba
          echo "RETICULATE_CONDA=$HOME/bin/micromamba" >> "$GITHUB_ENV"
          echo "RETICULATE_PYTHON=$HOME/mlr3automl-pyenv/bin/python" >> "$GITHUB_ENV"

      - name: Cache Python environment
        id: cache-pyenv
        uses: actions/cache@v4
        with:
          path: ~/mlr3automl-pyenv
          key: mlr3automl-pyenv-${{ runner.os }}-${{ hashFiles('R/install_python_learners.R') }}

      - name: Build Python environment
        if: steps.cache-pyenv.outputs.cache-hit != 'true'
        run: Rscript -e 'pkgload::load_all("."); install_python_learners(envname = path.expand("~/mlr3automl-pyenv"))'

      - uses: mxschmitt/action-tmate@v3
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}
        with:
          limit-access-to-actor: true

      - uses: r-lib/actions/check-r-package@v2
        with:
          error-on: '"note"'
          args: 'c("--no-manual")' # "--as-cran" prevents to start external processes
